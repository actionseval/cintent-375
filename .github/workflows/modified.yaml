name: Install Checker Dev

# CINTENT >> MANUAL_TRIGGER
# on: 
#   push:
#     branches: [ "dev" ]
#   pull_request:
#     branches: [ "dev" ]
on: [repository_dispatch, workflow_dispatch]

jobs:
  test-python-os-versions:
    name: Check Python ${{ matrix.python-version }} on ${{ matrix.runs-on }} on ${{ matrix.architecture }}
    continue-on-error: ${{ matrix.allow_failure }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        allow_failure: [false]
        runs-on: [ubuntu-latest]
        architecture: [x86_64]

        # CINTENT >> REMOVE_MATRIX
        # python-version: ["3.10", "3.11", "3.12"]
        python-version: ["3.12"]

        # include:
        #     - python-version: "3.12.0-beta.4"
        #       runs-on: ubuntu-latest
        #       allow_failure: true
        # Currently no public runners available for this but this or arm64 should work next time
        # include:
        #     - python-version: "3.10"
        #       architecture: [aarch64]
        #       runs-on: macos-latest
        #       allow_failure: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      # CINTENT >> INSERT_CINTENT
      - uses: JavidDitty/setup-cintent@3e5b2faf83a2ad32c22a1cd0f86f5f20ea53a5ab
      
      - name: Install repo
        run: |
          python -m pip install .
      - name: Check installation
        run: |
          python -c "import py4DSTEM; print(py4DSTEM.__version__)"
      # - name: Check machine arch
      #   run: |
      #     python -c "import platform; print(platform.machine())"

      # CINTENT >> INSERT_CINTENT
      - name: Upload CIntent Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.CINTENT_ARTIFACT_NAME }}
          path: ${{ env.CINTENT_LOGS }}
